<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="cabinet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="50%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
    <radialGradient id="glow-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff00" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4400" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-y" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Room -->
  <rect width="800" height="500" fill="#2a2520"/>
  <!-- Floor -->
  <rect y="400" width="800" height="100" fill="#3a3530"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#555" stroke-width="1"/>
  
  <!-- Cabinet 1 -->
  <rect x="40" y="100" width="120" height="300" fill="url(#cabinet)" rx="3"/>
  <rect x="50" y="110" width="100" height="80" fill="#333" rx="2"/>
  <!-- Vacuum tubes rack -->
  <g opacity="0.9">
    <circle cx="70" cy="140" r="5" fill="#ff6633" opacity="0.7"/><circle cx="70" cy="140" r="8" fill="url(#glow-r)"/>
    <circle cx="90" cy="140" r="5" fill="#ff6633" opacity="0.5"/><circle cx="90" cy="140" r="8" fill="url(#glow-r)"/>
    <circle cx="110" cy="140" r="5" fill="#ff8833" opacity="0.8"/><circle cx="110" cy="140" r="8" fill="url(#glow-y)"/>
    <circle cx="130" cy="140" r="5" fill="#ff6633" opacity="0.6"/><circle cx="130" cy="140" r="8" fill="url(#glow-r)"/>
    <circle cx="70" cy="165" r="5" fill="#ff8833" opacity="0.7"/><circle cx="70" cy="165" r="8" fill="url(#glow-y)"/>
    <circle cx="90" cy="165" r="5" fill="#ff6633" opacity="0.4"/><circle cx="90" cy="165" r="8" fill="url(#glow-r)"/>
    <circle cx="110" cy="165" r="5" fill="#ff6633" opacity="0.9"/><circle cx="110" cy="165" r="8" fill="url(#glow-r)"/>
    <circle cx="130" cy="165" r="5" fill="#ff8833" opacity="0.5"/><circle cx="130" cy="165" r="8" fill="url(#glow-y)"/>
  </g>
  <!-- Panel lines -->
  <line x1="50" y1="200" x2="150" y2="200" stroke="#666" stroke-width="0.5"/>
  <rect x="55" y="210" width="90" height="50" fill="#3a3a3a" rx="1"/>
  <rect x="55" y="270" width="90" height="50" fill="#3a3a3a" rx="1"/>
  <rect x="55" y="330" width="90" height="50" fill="#3a3a3a" rx="1"/>
  <!-- Wires -->
  <path d="M60 260 Q40 265 60 275" fill="none" stroke="#c44" stroke-width="1.5"/>
  <path d="M140 260 Q160 265 140 275" fill="none" stroke="#44c" stroke-width="1.5"/>
  
  <!-- Cabinet 2 - memory -->
  <rect x="180" y="100" width="120" height="300" fill="url(#cabinet)" rx="3"/>
  <rect x="190" y="110" width="100" height="140" fill="#333" rx="2"/>
  <!-- Electrostatic memory tubes (Williams tubes) -->
  <g>
    <circle cx="215" cy="150" r="18" fill="#223" stroke="#556" stroke-width="1"/>
    <circle cx="215" cy="150" r="12" fill="#112" stroke="#445" stroke-width="0.5"/>
    <circle cx="215" cy="150" r="3" fill="#0a0" opacity="0.5"/>
    <circle cx="215" cy="150" r="6" fill="url(#glow-g)"/>
    <circle cx="265" cy="150" r="18" fill="#223" stroke="#556" stroke-width="1"/>
    <circle cx="265" cy="150" r="12" fill="#112"/>
    <circle cx="265" cy="150" r="3" fill="#0a0" opacity="0.4"/>
    <circle cx="265" cy="150" r="6" fill="url(#glow-g)"/>
    <circle cx="215" cy="200" r="18" fill="#223" stroke="#556" stroke-width="1"/>
    <circle cx="215" cy="200" r="12" fill="#112"/>
    <circle cx="215" cy="200" r="3" fill="#0a0" opacity="0.6"/>
    <circle cx="215" cy="200" r="6" fill="url(#glow-g)"/>
    <circle cx="265" cy="200" r="18" fill="#223" stroke="#556" stroke-width="1"/>
    <circle cx="265" cy="200" r="12" fill="#112"/>
    <circle cx="265" cy="200" r="3" fill="#0a0" opacity="0.3"/>
    <circle cx="265" cy="200" r="6" fill="url(#glow-g)"/>
  </g>
  <text x="240" y="245" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">MEMORY</text>
  <rect x="190" y="260" width="100" height="120" fill="#3a3a3a" rx="1"/>
  
  <!-- Cabinet 3 - control panel (main) -->
  <rect x="320" y="80" width="160" height="320" fill="url(#cabinet)" rx="3"/>
  <rect x="330" y="90" width="140" height="60" fill="#333" rx="2"/>
  <!-- Indicator lights row -->
  <circle cx="350" cy="110" r="6" fill="#0f0" opacity="0.9"/><circle cx="350" cy="110" r="10" fill="url(#glow-g)"/>
  <circle cx="370" cy="110" r="6" fill="#ff0" opacity="0.7"/><circle cx="370" cy="110" r="10" fill="url(#glow-y)"/>
  <circle cx="390" cy="110" r="6" fill="#0f0" opacity="0.8"/>
  <circle cx="410" cy="110" r="6" fill="#333"/>
  <circle cx="430" cy="110" r="6" fill="#333"/>
  <circle cx="450" cy="110" r="6" fill="#f00" opacity="0.3"/>
  <circle cx="350" cy="135" r="6" fill="#ff0" opacity="0.5"/>
  <circle cx="370" cy="135" r="6" fill="#0f0" opacity="0.6"/>
  <circle cx="390" cy="135" r="6" fill="#333"/>
  <circle cx="410" cy="135" r="6" fill="#ff0" opacity="0.4"/>
  <circle cx="430" cy="135" r="6" fill="#0f0" opacity="0.9"/><circle cx="430" cy="135" r="10" fill="url(#glow-g)"/>
  <circle cx="450" cy="135" r="6" fill="#333"/>
  <!-- Register display area -->
  <rect x="335" y="160" width="130" height="40" fill="#112" rx="2"/>
  <text x="345" y="178" font-family="monospace" font-size="10" fill="#0f0" opacity="0.8">AC: 0000000000</text>
  <text x="345" y="193" font-family="monospace" font-size="10" fill="#0f0" opacity="0.8">MQ: 0000000000</text>
  <!-- Switches and buttons -->
  <g transform="translate(335,210)">
    <rect x="0" y="0" width="130" height="80" fill="#444" rx="2"/>
    <rect x="10" y="10" width="18" height="8" fill="#c44" rx="2"/>
    <text x="10" y="30" font-family="sans-serif" font-size="6" fill="#aaa">POWER</text>
    <rect x="40" y="10" width="18" height="8" fill="#888" rx="2"/>
    <text x="40" y="30" font-family="sans-serif" font-size="6" fill="#aaa">STEP</text>
    <rect x="70" y="10" width="18" height="8" fill="#4a4" rx="2"/>
    <text x="72" y="30" font-family="sans-serif" font-size="6" fill="#aaa">RUN</text>
    <rect x="100" y="10" width="18" height="8" fill="#888" rx="2"/>
    <text x="100" y="30" font-family="sans-serif" font-size="6" fill="#aaa">STOP</text>
    <!-- Rotary dial -->
    <circle cx="65" cy="58" r="18" fill="#555" stroke="#777" stroke-width="1"/>
    <circle cx="65" cy="58" r="2" fill="#aaa"/>
    <line x1="65" y1="58" x2="65" y2="42" stroke="#ccc" stroke-width="2"/>
  </g>
  <!-- Lower panel -->
  <rect x="335" y="300" width="130" height="90" fill="#3a3a3a" rx="1"/>
  
  <!-- Cabinet 4 - arithmetic -->
  <rect x="500" y="100" width="120" height="300" fill="url(#cabinet)" rx="3"/>
  <rect x="510" y="110" width="100" height="80" fill="#333" rx="2"/>
  <g opacity="0.9">
    <circle cx="530" cy="140" r="5" fill="#ff6633" opacity="0.6"/><circle cx="530" cy="140" r="8" fill="url(#glow-r)"/>
    <circle cx="550" cy="140" r="5" fill="#ff8833" opacity="0.8"/><circle cx="550" cy="140" r="8" fill="url(#glow-y)"/>
    <circle cx="570" cy="140" r="5" fill="#ff6633" opacity="0.5"/>
    <circle cx="590" cy="140" r="5" fill="#ff6633" opacity="0.7"/><circle cx="590" cy="140" r="8" fill="url(#glow-r)"/>
    <circle cx="530" cy="165" r="5" fill="#ff8833" opacity="0.4"/>
    <circle cx="550" cy="165" r="5" fill="#ff6633" opacity="0.9"/><circle cx="550" cy="165" r="8" fill="url(#glow-r)"/>
    <circle cx="570" cy="165" r="5" fill="#ff6633" opacity="0.6"/>
    <circle cx="590" cy="165" r="5" fill="#ff8833" opacity="0.5"/>
  </g>
  <text x="560" y="205" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">ARITHMETIC</text>
  <rect x="510" y="210" width="100" height="170" fill="#3a3a3a" rx="1"/>
  
  <!-- Cabinet 5 - I/O -->
  <rect x="640" y="100" width="120" height="300" fill="url(#cabinet)" rx="3"/>
  <!-- Paper tape reader -->
  <rect x="660" y="120" width="80" height="100" fill="#555" rx="2"/>
  <rect x="670" y="130" width="60" height="20" fill="#f5f0e0" rx="1"/>
  <!-- Tape holes -->
  <circle cx="685" cy="137" r="2" fill="#333"/>
  <circle cx="693" cy="141" r="2" fill="#333"/>
  <circle cx="701" cy="137" r="2" fill="#333"/>
  <circle cx="709" cy="141" r="2" fill="#333"/>
  <circle cx="717" cy="137" r="2" fill="#333"/>
  <!-- Sprocket holes -->
  <circle cx="685" cy="133" r="1" fill="#333"/>
  <circle cx="693" cy="133" r="1" fill="#333"/>
  <circle cx="701" cy="133" r="1" fill="#333"/>
  <circle cx="709" cy="133" r="1" fill="#333"/>
  <circle cx="717" cy="133" r="1" fill="#333"/>
  <text x="700" y="175" text-anchor="middle" font-family="monospace" font-size="7" fill="#aaa">TAPE READER</text>
  <!-- Tape dangling -->
  <path d="M670 150 Q660 170 670 190 Q680 210 670 230 Q660 250 665 270" fill="none" stroke="#f5f0e0" stroke-width="8" opacity="0.6"/>
  <rect x="660" y="240" width="80" height="140" fill="#3a3a3a" rx="1"/>
  <text x="700" y="315" text-anchor="middle" font-family="monospace" font-size="7" fill="#aaa">PUNCH</text>
  
  <!-- Cable bundle on floor -->
  <path d="M160 400 Q200 410 320 400" fill="none" stroke="#444" stroke-width="4"/>
  <path d="M480 400 Q520 415 640 400" fill="none" stroke="#444" stroke-width="4"/>
  
  <!-- Labels -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#ddd">Inside WEIZAC — Five Cabinet Architecture</text>
  <text x="400" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#999" font-style="italic">Vacuum tubes glowing, electrostatic memory, paper tape reader</text>
  <text x="100" y="420" text-anchor="middle" font-family="monospace" font-size="9" fill="#777">LOGIC</text>
  <text x="240" y="420" text-anchor="middle" font-family="monospace" font-size="9" fill="#777">MEMORY</text>
  <text x="400" y="420" text-anchor="middle" font-family="monospace" font-size="9" fill="#777">CONTROL</text>
  <text x="560" y="420" text-anchor="middle" font-family="monospace" font-size="9" fill="#777">ALU</text>
  <text x="700" y="420" text-anchor="middle" font-family="monospace" font-size="9" fill="#777">I/O</text>
</svg>